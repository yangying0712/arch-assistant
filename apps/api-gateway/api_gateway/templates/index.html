<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>架构风格智能助手 v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",system-ui,sans-serif;background:#0a0e1a;color:#cbd5e1;min-height:100vh;display:flex;flex-direction:column}
header{background:#141b2d;padding:12px 20px;border-bottom:1px solid #1e2d4a;display:flex;align-items:center;justify-content:space-between}
h1{font-size:18px;color:#60a5fa;display:flex;align-items:center;gap:8px}
h1 span{font-size:12px;color:#64748b;font-weight:normal}
#layout{flex:1;display:grid;grid-template-columns:1fr 420px;gap:0;overflow:hidden}
#chat-panel{display:flex;flex-direction:column;overflow:hidden}
#chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{padding:12px 16px;border-radius:10px;max-width:88%;line-height:1.7;font-size:14px;white-space:pre-wrap;overflow-wrap:break-word}
.msg.user{align-self:flex-end;background:#1d4ed8;color:#f0f6ff}
.msg.assistant{align-self:flex-start;background:#1e293b;border:1px solid #334155}
.msg.system{align-self:center;background:transparent;color:#64748b;font-size:13px;text-align:center;max-width:100%}
.msg .stage{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;margin-right:6px;background:#1e3a5f;color:#93c5fd}
#input-area{display:flex;gap:8px;padding:12px 16px;border-top:1px solid #1e2d4a;background:#141b2d}
#input{flex:1;padding:10px 14px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:14px;resize:none;min-height:50px;max-height:120px}
#input:focus{outline:none;border-color:#3b82f6}
.btn{padding:10px 18px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;background:#1e3a5f}
.btn-mic{background:#334155;color:#cbd5e1;display:flex;align-items:center;gap:6px;min-width:50px;justify-content:center}
.btn-mic:hover{background:#475569}
.btn-mic.listening{background:#dc2626;color:#fff;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
#viz-panel{overflow-y:auto;padding:16px;background:#0f172a;border-left:1px solid #1e2d4a;display:none}
#viz-panel.active{display:block}
#viz-panel h3{font-size:15px;color:#60a5fa;margin:16px 0 10px;border-bottom:1px solid #1e2d4a;padding-bottom:6px}
#viz-panel h3:first-child{margin-top:0}
.matrix{width:100%;border-collapse:collapse;font-size:12px}
.matrix th{background:#1e293b;padding:8px 10px;text-align:left;color:#94a3b8;font-weight:600;white-space:nowrap}
.matrix th:first-child{position:sticky;left:0;z-index:1;background:#1e293b}
.matrix td{padding:8px 10px;border-bottom:1px solid #1e2d4a;white-space:nowrap}
.matrix .bar-cell{min-width:80px}
.bar{height:6px;border-radius:3px;background:#334155;position:relative;min-width:50px}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}
.bar-fill.low{background:#f59e0b}.bar-fill.med{background:#3b82f6}.bar-fill.high{background:#22c55e}
.bar-fill.vhigh{background:#a855f7}
.bar-fill.xhigh{background:#ef4444}
.score-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;color:#fff}
.score-badge.gold{background:#b8860b}.score-badge.silver{background:#64748b}.score-badge.bronze{background:#92400e}
.topo-svg{width:100%;height:280px;background:#0a0e1a;border-radius:8px;border:1px solid #1e2d4a}
.trace-item{background:#1e293b;border-radius:8px;padding:10px 14px;margin:6px 0;font-size:13px;border-left:3px solid #3b82f6}
.trace-item .arrow{color:#f59e0b;font-weight:bold}
.combo-rec{background:linear-gradient(135deg,#1e293b,#1a1040);border:1px solid #4c1d95;border-radius:8px;padding:12px;margin:8px 0;font-size:13px}
@media(max-width:800px){#layout{grid-template-columns:1fr}#viz-panel{display:none!important}}
</style>
</head>
<body>
<header>
<h1>🏗️ 软件架构风格智能助手 <span>v2 · 对比矩阵 + 决策溯源</span></h1>
<div style="display:flex;gap:8px">
<button class="btn btn-mic" id="mic-btn" onclick="toggleMic()" title="语音输入">🎤</button>
</div>
</header>
<div id="layout">
<div id="chat-panel">
<div id="chat">
<div class="msg system">👋 你好！描述你的软件需求，我会推荐最合适的架构风格。<br>点击 🎤 按钮可以用语音输入。</div>
</div>
<div id="input-area">
<textarea id="input" placeholder="描述你的软件需求，例如：开发一个跨平台的即时通讯系统，要求支持万人同时在线..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
<button class="btn btn-primary" id="send-btn" onclick="send()">发送</button>
</div>
<div id="status" style="text-align:center;font-size:12px;color:#64748b;padding:4px"></div>
</div>
<div id="viz-panel"></div>
</div>

<script>
// ── Voice ────────────────────────────────────
let recognition=null,isListening=false,speechSynthesis=window.speechSynthesis;
function toggleMic(){
if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)){
document.getElementById('status').textContent='⚠️ 浏览器不支持语音识别，请用 Chrome/Edge';
return;
}
if(isListening){stopMic();return}
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
recognition=new SR();recognition.lang='zh-CN';recognition.interimResults=true;recognition.continuous=false;
recognition.onstart=()=>{
isListening=true;document.getElementById('mic-btn').classList.add('listening');
document.getElementById('mic-btn').textContent='⏹';document.getElementById('status').textContent='🎙️ 正在聆听...';
};
recognition.onresult=(e)=>{
let text='';for(let i=0;i<e.results.length;i++)text+=e.results[i][0].transcript;
document.getElementById('input').value=text;
};
recognition.onerror=(e)=>{document.getElementById('status').textContent='语音识别错误: '+e.error;stopMic()};
recognition.onend=()=>{stopMic();if(document.getElementById('input').value.trim())send()};
recognition.start();
}
function stopMic(){
isListening=false;document.getElementById('mic-btn').classList.remove('listening');
document.getElementById('mic-btn').textContent='🎤';document.getElementById('status').textContent='';
if(recognition){recognition.stop();recognition=null}
}
function speak(text){
if(!speechSynthesis)return;
speechSynthesis.cancel();
const utter=new SpeechSynthesisUtterance(text);utter.lang='zh-CN';utter.rate=1.0;
speechSynthesis.speak(utter);
}

// ── Markdown Render ────────────────────────
function renderMarkdown(text){
if(!text)return'';
// Code blocks
html=html.replace(/```(\\w*)\s([\\s\\S]*?)```/g,'<pre style="background:#0f172a;padding:10px;border-radius:6px;overflow-x:auto;font-size:12px"><code>$2</code></pre>');
// Inline code
html=html.replace(/`([^`]+)`/g,'<code style="background:#334155;padding:1px 5px;border-radius:3px;font-size:12px">$1</code>');
// Tables — convert markdown pipe tables to HTML tables
html=html.replace(/(\\|.+\\|\\s\\|[-: |]+\\|\\s((?:\\|.+\\|\\s?)+))/g,function(m){
  const lines=m.trim().split('\\n').filter(l=>l.includes('|')&&!l.match(/^\|[-: |]+\|$/));
  let tbl='<table style="width:100%;border-collapse:collapse;margin:8px 0;font-size:12px;border:1px solid #334155">';
  lines.forEach((line,i)=>{
    const cells=line.split('|').filter(c=>c.trim());
    const tag=i===0?'th':'td';
    const style=i===0?'background:#1e293b;color:#94a3b8;padding:6px 10px;text-align:left;border:1px solid #334155':'padding:6px 10px;border:1px solid #334155;vertical-align:top';
    tbl+='<tr>'+cells.map(c=>'<'+tag+' style="'+style+'">'+c.trim()+'</'+tag+'>').join('')+'</tr>';
  });
  return tbl+'</table>';
});
// Headers
html=html.replace(/^### (.+)$/gm,'<h4 style="color:#93c5fd;margin:10px 0 4px">$1</h4>');
html=html.replace(/^## (.+)$/gm,'<h3 style="color:#60a5fa;margin:12px 0 6px;font-size:15px">$1</h3>');
html=html.replace(/^# (.+)$/gm,'<h2 style="color:#3b82f6;margin:14px 0 8px;font-size:17px">$1</h2>');
// Bold and italic — handle nested cases
html=html.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
html=html.replace(/\*\*(.+?)\*\*/g,'<strong style="color:#f8fafc">$1</strong>');
html=html.replace(/\*(.+?)\*/g,'<em>$1</em>');
// Unordered lists
html=html.replace(/^- (.+)$/gm,'<li style="margin:2px 0">$1</li>');
// Ordered lists
html=html.replace(/^\d+\. (.+)$/gm,'<li style="margin:2px 0">$1</li>');
// Wrap consecutive <li> in <ul>
html=html.replace(/((?:<li[^>]*>.*?<\/li>\\n?)+)/g,'<ul style="padding-left:20px;margin:6px 0">$1</ul>');
// Horizontal rules
html=html.replace(/^---$/gm,'<hr style="border-color:#334155;margin:8px 0">');
// Line breaks
html=html.replace(/\\n\\n/g,'<br><br>');
return html;
}

// ── Chat ────────────────────────────────────
function append(msg,role,stage,isHtml){
const d=document.createElement('div');d.className='msg '+role;
if(stage)d.innerHTML='<span class="stage">'+stage+'</span>'+(isHtml?msg:renderMarkdown(msg));
else d.innerHTML=isHtml?msg:renderMarkdown(msg);
document.getElementById('chat').appendChild(d);d.scrollIntoView({behavior:'smooth'});
return d;
}
async function send(){
const input=document.getElementById('input');const prompt=input.value.trim();if(!prompt)return;
const sendBtn=document.getElementById('send-btn');
append(prompt,'user');input.value='';sendBtn.disabled=true;
const loadDiv=append('','assistant');loadDiv.innerHTML='<span class="stage">🔍</span> 正在分析需求...';
try{
const res=await fetch('/api/v1/analyze',{method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({prompt,session_id:crypto.randomUUID()})});
if(!res.ok)throw new Error(await res.text());
const data=await res.json();
loadDiv.remove();
renderResult(data);
}catch(e){loadDiv.remove();append('❌ 错误: '+e.message,'assistant')}
sendBtn.disabled=false;
}

// ── Render ──────────────────────────────────
function renderResult(data){
const viz=document.getElementById('viz-panel');viz.innerHTML='';viz.classList.add('active');

// Features
if(data.features && data.features.features){
const feats=data.features.features.join(' · ');
const keys=(data.features.key_requirements||[]).join(', ');
const cons=data.features.constraints||{};
let featStr='📋 **提取特征**: '+feats+'\n';
if(keys)featStr+='🔑 **关键需求**: '+keys+'\n';
featStr+='📊 **约束**: 并发='+(cons.concurrency||'?')+' | 一致性='+(cons.consistency||'?')+' | 扩展需求='+(cons.scalability_need||'?')+' | 复杂度容忍='+(cons.complexity_tolerance||'?');
append(featStr,'assistant','特征提取');
}

// Candidates
const cands=data.candidates||[];
if(cands.length){
let candStr='🎯 **候选架构** (按匹配度排序):\n';
const medals=['🥇','🥈','🥉'];
cands.forEach((c,i)=>{
const badge=i===0?'gold':i===1?'silver':'bronze';
candStr+='  '+medals[i]+' <span class="score-badge '+badge+'">'+(c.match_score*100).toFixed(0)+'分</span> **'+c.name+'**';
if(c.rule_engine_note)candStr+=' ['+c.rule_engine_note+']';
candStr+='\n';
if(c.match_reasons)candStr+='    理由: '+c.match_reasons.slice(0,2).join('; ')+'\n';
});
const candDiv=append(candStr,'assistant','架构匹配');
candDiv.innerHTML=candStr;

// Visualization
buildMatrix(cands);
buildTopology(cands[0]?.name||'');
}

// Decision trace
if(cands.length>0 && cands[0].match_reasons){
let trace='<h3>🔗 决策溯源</h3>';
cands[0].match_reasons.forEach((r,i)=>trace+='<div class="trace-item"><span class="arrow">'+(i+1)+' → </span>'+r+'</div>');
if(cands.length>1){
trace+='<div class="trace-item" style="border-left-color:#64748b">❌ 排除 <b>'+cands[1].name+'</b>: ';
if(cands[1].risks)trace+=cands[1].risks.slice(0,2).join('; ');
trace+='</div>';
}
viz.innerHTML+=trace;
}

// Combo recommendation
if(cands.length>=2){
viz.innerHTML+='<h3>💡 推荐组合</h3><div class="combo-rec">✨ <b>'+cands[0].name+'</b> 作为核心架构，配合 <b>'+cands[1].name+'</b> 处理特定场景。两者优势互补，可显著提升系统整体的可扩展性和灵活性。</div>';
}

// Report
if(data.report){
const reportDiv=append(data.report,'assistant','评估报告');
// Speak summary
const cList=data.candidates||[];
if(cList.length)speak('推荐架构: '+cList[0].name+', 匹配度'+(cList[0].match_score*100).toFixed(0)+'%');
}

if(data.cached)append('⚡ 缓存命中','system');
}

// ── Comparison Matrix ────────────────────────
function buildMatrix(candidates){
const dims=['scalability','performance','coupling','complexity','deployability','testability'];
const dimLabels={'scalability':'可扩展性','performance':'性能','coupling':'松耦合','complexity':'复杂度','deployability':'部署灵活','testability':'可测试性'};
const scores={'极高':4,'高':3,'中':2,'低':1,'极低':0,'低（通过事件解耦）':1,'低（核心与外部解耦）':1,'低（核心与插件解耦）':1,'低（过滤器独立）':1,'低（事件触发）':1,'极低':0,'中（异步处理）':2,'高（异步处理）':3,'高（读写独立扩展）':3,'高（自组织扩展）':3,'极高（自动扩缩）':4,'极高（内存级访问）':4,'中（需考虑网络开销）':1,'低（ESB是瓶颈）':0,'中（冷启动延迟）':1};
function getScore(name,dim){
const s=getKB(name);if(!s)return 0;
const v=s[dim]||'中';
if(scores[v]!==undefined)return scores[v];
if(typeof v==='string'){if(v.includes('极高'))return 4;if(v.includes('高'))return 3;if(v.includes('中'))return 2;if(v.includes('低'))return 1}
return 2;
}
let html='<h3>📊 多维度对比矩阵</h3><div style="overflow-x:auto"><table class="matrix"><tr><th>维度</th>';
candidates.forEach(c=>html+='<th>'+c.name.split('(')[0].trim()+'</th>');
html+='</tr>';
dims.forEach(d=>{
html+='<tr><td>'+dimLabels[d]+'</td>';
const vals=candidates.map(c=>getScore(c.name,d));
const maxV=Math.max(...vals,1);
candidates.forEach((c,i)=>{
const v=vals[i];const pct=v/maxV*100;
const cls=v>=4?'xhigh':v>=3?'high':v>=2?'med':'low';
html+='<td class="bar-cell"><div class="bar"><div class="bar-fill '+cls+'" style="width:'+pct+'%"></div></div> <small>'+['极低','低','中','高','极高'][v]+'</small></td>';
});
html+='</tr>';
});
html+='</table></div>';
document.getElementById('viz-panel').innerHTML+=html;
}

// ── Topology Diagram ─────────────────────────
function buildTopology(archName){
let svg='';
if(archName.includes('微服务'))svg=microservicesSVG();
else if(archName.includes('事件驱动'))svg=eventDrivenSVG();
else if(archName.includes('管道')||archName.includes('过滤器'))svg=pipeFilterSVG();
else if(archName.includes('CQRS'))svg=cqrsSVG();
else if(archName.includes('六边形'))svg=hexagonalSVG();
else if(archName.includes('对等')||archName.includes('P2P'))svg=p2pSVG();
else if(archName.includes('分层'))svg=layeredSVG();
else if(archName.includes('MVC'))svg=mvcSVG();
else if(archName.includes('Space'))svg=spaceBasedSVG();
else if(archName.includes('Serverless'))svg=serverlessSVG();
else if(archName.includes('插件')||archName.includes('微内核'))svg=pluginSVG();
else if(archName.includes('SOA'))svg=soaSVG();
else svg=genericSVG();
document.getElementById('viz-panel').innerHTML+='<h3>🗺️ 架构拓扑图</h3><svg class="topo-svg" viewBox="0 0 380 260">'+svg+'</svg>';
}

`}
function eventDrivenSVG(){return`
<rect x="140" y="10" width="100" height="28" rx="6" fill="#9333ea"/><text x="190" y="28" text-anchor="middle" fill="#fff" font-size="10">事件总线</text>

<rect x="110" y="70" width="80" height="35" rx="6" fill="#a855f7"/><text x="150" y="92" text-anchor="middle" fill="#fff" font-size="10">生产者B</text>
<rect x="205" y="70" width="80" height="35" rx="6" fill="#7c3aed"/><text x="245" y="92" text-anchor="middle" fill="#fff" font-size="10">消费者A</text>
<rect x="300" y="70" width="80" height="35" rx="6" fill="#7c3aed"/><text x="340" y="92" text-anchor="middle" fill="#fff" font-size="10">消费者B</text>
<line x1="55" y1="70" x2="175" y2="38" stroke="#a855f7" stroke-width="1.5"/><line x1="150" y1="70" x2="190" y2="38" stroke="#a855f7" stroke-width="1.5"/>
<line x1="200" y1="38" x2="245" y2="70" stroke="#7c3aed" stroke-width="1.5"/><line x1="200" y1="38" x2="340" y2="70" stroke="#7c3aed" stroke-width="1.5"/>

`}
function pipeFilterSVG(){return`
<rect x="10" y="90" width="55" height="36" rx="6" fill="#0ea5e9"/><text x="37" y="112" text-anchor="middle" fill="#fff" font-size="10">源数据</text>
<rect x="78" y="90" width="55" height="36" rx="6" fill="#0284c7"/><text x="105" y="112" text-anchor="middle" fill="#fff" font-size="10">过滤器1</text>
<rect x="146" y="90" width="55" height="36" rx="6" fill="#0284c7"/><text x="173" y="112" text-anchor="middle" fill="#fff" font-size="10">过滤器2</text>

// ── KB stub for matrix scores ────────────────
function getKB(name){
const map={
'分层架构 (Layered Architecture)':{scalability:'低',performance:'中',coupling:'高（层间紧耦合）',complexity:'低',deployability:'单体部署',testability:'中'},
'微服务架构 (Microservices Architecture)':{scalability:'高',performance:'中（需考虑网络开销）',coupling:'低',complexity:'高',deployability:'独立部署',testability:'高（单服务）'},
'事件驱动架构 (Event-Driven Architecture)':{scalability:'高',performance:'高（异步处理）',coupling:'低（通过事件解耦）',complexity:'高',deployability:'独立部署',testability:'中（事件流测试复杂）'},
'CQRS (命令查询职责分离)':{scalability:'高（读写独立扩展）',performance:'高',coupling:'低',complexity:'高',deployability:'独立部署',testability:'高'},
'管道-过滤器架构 (Pipe-Filter Architecture)':{scalability:'中',performance:'高（并行处理）',coupling:'低（过滤器独立）',complexity:'中',deployability:'单体/独立',testability:'高（每个过滤器独立测试）'},
'SOA (面向服务架构)':{scalability:'中',performance:'低（ESB是瓶颈）',coupling:'中',complexity:'高',deployability:'集中管理',testability:'中'},
'六边形架构/端口适配器 (Hexagonal/Ports & Adapters)':{scalability:'中',performance:'中',coupling:'低（核心与外部解耦）',complexity:'中',deployability:'灵活',testability:'高（核心可独立测试）'},
'MVC架构 (Model-View-Controller)':{scalability:'低',performance:'中',coupling:'中',complexity:'低',deployability:'单体',testability:'中'},
'Space-Based架构 (基于空间的架构)':{scalability:'极高',performance:'极高（内存级访问）',coupling:'低',complexity:'极高',deployability:'分布式',testability:'低'},
'对等架构 (Peer-to-Peer Architecture)':{scalability:'高（自组织扩展）',performance:'中',coupling:'极低',complexity:'高',deployability:'去中心化部署',testability:'低'},
'Serverless架构':{scalability:'极高（自动扩缩）',performance:'中（冷启动延迟）',coupling:'低（事件触发）',complexity:'中',deployability:'函数级部署',testability:'中'},
'插件架构/微内核 (Plugin/Microkernel Architecture)':{scalability:'中',performance:'中',coupling:'低（核心与插件解耦）',complexity:'中',deployability:'核心+插件独立',testability:'高'}
};
return map[name]||null;
}
